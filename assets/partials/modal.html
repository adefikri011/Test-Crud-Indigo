<!-- Modal Overlay -->
<div id="employeeModal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 px-4">

  <!-- Modal Container -->
  <div class="w-full max-w-2xl rounded-2xl bg-white shadow-xl overflow-hidden animate-fadeIn">

    <!-- Header -->
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <div>
        <h2 id="modalTitle" class="text-xl font-semibold text-slate-900">
          Tambah Karyawan
        </h2>
        <p class="text-sm text-slate-500 mt-1">
          Isi data karyawan di bawah ini.
        </p>
      </div>

      <button id="closeModal"
              type="button"
              class="rounded-full p-2 text-slate-500 hover:bg-slate-100 hover:text-red-500 transition">
        ✕
      </button>
    </div>

    <!-- Body -->
    <form id="employeeForm" class="px-6 py-6">

      <input type="hidden" id="employeeId" />

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- Nama -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Nama <span class="text-red-500">*</span>
          </label>
          <input type="text" id="name"
                 class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          <p id="nameError" class="text-sm text-red-500 mt-1 hidden">
            Nama wajib diisi.
          </p>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Email <span class="text-red-500">*</span>
          </label>
          <input type="email" id="email"
                 class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          <p id="emailError" class="text-sm text-red-500 mt-1 hidden">
            Email tidak valid.
          </p>
        </div>

        <!-- Jabatan -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Jabatan <span class="text-red-500">*</span>
          </label>
          <input type="text" id="position"
                 class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          <p id="positionError" class="text-sm text-red-500 mt-1 hidden">
            Jabatan wajib diisi.
          </p>
        </div>

        <!-- Departemen -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Departemen <span class="text-red-500">*</span>
          </label>
          <select id="department"
                  class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition bg-white">
            <option value="">Pilih Departemen</option>
            <option value="IT">IT</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
            <option value="Marketing">Marketing</option>
            <option value="Operations">Operations</option>
          </select>
          <p id="departmentError" class="text-sm text-red-500 mt-1 hidden">
            Departemen wajib dipilih.
          </p>
        </div>

        <!-- Gaji -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Gaji <span class="text-red-500">*</span>
          </label>
          <input type="number" id="salary"
                 class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          <p id="salaryError" class="text-sm text-red-500 mt-1 hidden">
            Gaji wajib diisi.
          </p>
        </div>

        <!-- Tanggal Masuk -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            Tanggal Masuk <span class="text-red-500">*</span>
          </label>
          <input type="date" id="joinDate"
                 class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          <p id="joinDateError" class="text-sm text-red-500 mt-1 hidden">
            Tanggal masuk wajib diisi.
          </p>
        </div>

      </div>

      <!-- Footer -->
      <div class="mt-6 flex justify-end gap-3 border-t border-slate-200 pt-5">
        <button type="button"
                id="cancelBtn"
                class="rounded-xl bg-slate-200 px-5 py-3 font-semibold text-slate-700 hover:bg-slate-300 transition">
          Batal
        </button>

        <button type="submit"
                id="submitBtn"
                class="rounded-xl bg-blue-600 px-5 py-3 font-semibold text-white hover:bg-blue-700 transition shadow-sm">
          Simpan
        </button>
      </div>

    </form>

  </div>
</div>
