<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Management System</title>
  <meta name="description"
    content="Aplikasi CRUD karyawan berbasis jQuery untuk mengelola data, pencarian, filter departemen, dan statistik karyawan secara efisien." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="http://127.0.0.1:5500/index.html" />
  <meta property="og:title" content="Employee Management System" />
  <meta property="og:description"
    content="Aplikasi CRUD karyawan berbasis jQuery untuk mengelola data, pencarian, filter departemen, dan statistik karyawan." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="http://127.0.0.1:5500/index.html" />
  <meta property="og:locale" content="id_ID" />
  <meta name="twitter:card" content="summary" />

  <link rel="preload" href="assets/css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="assets/css/style.css"></noscript>
</head>

<body class="bg-slate-50 text-slate-900">

  <main id="main-content" class="min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
      <section id="header-section" data-partial="partials/header-section.html"></section>
      <section id="summary-section" data-partial="partials/summary-section.html"></section>
      <section id="action-section" data-partial="partials/action-section.html"></section>
      <section id="table-section" data-partial="partials/table-section.html"></section>
    </div>
  </main>

  <div id="overlay-section" data-partial="partials/overlay-section.html"></div>
  <div id="modal-section" data-partial="partials/modal-section.html"></div>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Employee Management System",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Aplikasi CRUD karyawan berbasis jQuery untuk mengelola data, pencarian, filter departemen, dan statistik karyawan secara efisien."
    }
  </script>

  <script src="assets/libs/jquery.min.js" defer></script>
  <script src="assets/js/app.bundle.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      window.__APP_PARTIALS_READY__ = false;

      const targets = Array.from(document.querySelectorAll("[data-partial]"));
      const criticalTargets = targets.filter(function (target) {
        return target.id !== "modal-section";
      });
      const deferredTargets = targets.filter(function (target) {
        return target.id === "modal-section";
      });
      const isLocalHost = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost";
      const partialCacheMode = isLocalHost ? "no-store" : "force-cache";

      const loadPartial = function (target) {
        const url = target.getAttribute("data-partial");
        return fetch(url, { cache: partialCacheMode })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Failed to load " + url + " (" + response.status + ")");
            }
            return response.text();
          })
          .then(function (html) {
            const liveReloadPattern = new RegExp("<!-- Code injected by live-server -->[\\s\\S]*?<\\/script>", "g");
            const sanitizedHtml = html.replace(liveReloadPattern, "");
            target.innerHTML = sanitizedHtml;
          });
      };

      const markPartialsReady = function () {
        window.__APP_PARTIALS_READY__ = true;
        window.dispatchEvent(new CustomEvent("app:partials-ready"));

        deferredTargets.forEach(function (target) {
          loadPartial(target).catch(function (error) {
            console.error("Deferred partial loader error:", error);
          });
        });
      };

      Promise.all(
        criticalTargets.map(loadPartial)
      )
        .then(markPartialsReady)
        .catch(function (error) {
          console.error("Partial loader error:", error);
          markPartialsReady();
        });
    });
  </script>

</body>

</html>
