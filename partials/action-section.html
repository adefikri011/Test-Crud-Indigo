<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
  <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-4">
    <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label for="searchInput" class="block text-sm font-medium text-slate-700 mb-2">
          Search Karyawan
        </label>

        <input type="text" id="searchInput" placeholder="Cari berdasarkan nama, email, jabatan, atau departemen..."
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
      </div>

      <div>
        <label for="departmentFilter" class="block text-sm font-medium text-slate-700 mb-2">
          Filter Departemen
        </label>

        <select id="departmentFilter"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition bg-white">
          <option value="">Semua Departemen</option>
          <option value="IT">IT</option>
          <option value="HR">HR</option>
          <option value="Finance">Finance</option>
          <option value="Marketing">Marketing</option>
          <option value="Operations">Operations</option>
        </select>
      </div>
    </div>

    <div class="flex items-end">
      <button id="addEmployeeBtn" type="button"
        class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-6 py-3 font-semibold text-white hover:bg-blue-700 transition shadow-sm">
        + Tambah Karyawan
      </button>
    </div>
  </div>
</div>
